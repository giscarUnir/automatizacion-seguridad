# Capas OSS: secretos, SAST, SCA e IaC. Cada una es un job independiente
# (aparece como un check separado en el PR). Suben resultados en SARIF.
name: security-oss
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  secretos-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: pip install semgrep
      - run: semgrep scan --config=auto --sarif --output=semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sca-trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  iac-checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: pip install checkov
      - run: checkov -d . --quiet --output sarif --output-file-path . || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results_sarif.sarif
          category: checkov
