# Capas OSS: secretos, SAST, SCA e IaC. Cada una es un job independiente
# (aparece como un check separado en el PR). Suben resultados en SARIF.
name: security-oss
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions: {}

concurrency:
  group: security-oss-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secretos-gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  sast-semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Instalar Semgrep versionado
        run: pip install --disable-pip-version-check semgrep==1.168.0
      - name: Semgrep — bloquear hallazgos
        run: semgrep scan --config=auto --error --sarif --output=semgrep.sarif .
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sca-trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          limit-severities-for-sarif: true
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  iac-checkov:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Instalar Checkov versionado
        run: pip install --disable-pip-version-check checkov==3.3.8
      - name: Checkov — bloquear configuraciones inseguras
        run: checkov -d . --framework kubernetes dockerfile --quiet --output sarif --output-file-path .
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: results_sarif.sarif
          category: checkov
