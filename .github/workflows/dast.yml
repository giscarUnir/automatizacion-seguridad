# Capa DAST: levanta la app y la ataca con OWASP ZAP (baseline) en vivo.
name: dast-zap
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Empaquetar y levantar la app
        run: |
          mvn -B -DskipTests package
          nohup java -jar target/quarkus-app/quarkus-run.jar > app.log 2>&1 &
          for i in $(seq 1 40); do
            curl -fsS http://localhost:8080/q/health/ready && break || sleep 3
          done
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080/banco-x/clientes/v1"
          fail_action: false
          allow_issue_writing: true
