# Capa DAST: levanta la app y la ataca con OWASP ZAP (baseline) en vivo.
name: dast-zap
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: dast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Empaquetar y levantar la app
        run: |
          mvn -B -DskipTests package
          nohup java -jar target/quarkus-app/quarkus-run.jar > app.log 2>&1 &
          echo $! > app.pid
          for _ in $(seq 1 40); do
            if curl -fsS http://localhost:8080/q/health/ready; then
              break
            fi
            sleep 3
          done
          curl -fsS http://localhost:8080/q/health/ready
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://localhost:8080/banco-x/clientes/v1"
          rules_file_name: ".zap/rules.tsv"
          fail_action: true
          allow_issue_writing: false
          artifact_name: "zap-baseline-report"
