title = "gitleaks - vitrina de seguridad Banco X"
[extend]
useDefault = true

# En la rama principal, el generador de demo y la documentacion contienen
# el generador de datos ficticios; se excluyen por RUTA para no marcar falso positivo.
# La rama demo materializa el patron en src/main/resources (ruta NO excluida) y se detecta.
[allowlist]
description = "Excluir generador de demo y docs"
paths = [
  '''scripts/crear-branch-demo\.sh''',
  '''demo-inseguro/.*''',
  '''GUIA-DEMO\.md''',
  '''README\.md''',
]
