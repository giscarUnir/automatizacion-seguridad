# DEMO INSEGURO: privilegiado, como root, sin limites ni securityContext.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cliente-service
  namespace: banco-x
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cliente-service
  template:
    metadata:
      labels:
        app: cliente-service
    spec:
      containers:
        - name: cliente-service
          image: ghcr.io/owner/cliente-service:latest
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
          ports:
            - containerPort: 8080
