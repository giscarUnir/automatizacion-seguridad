quarkus.application.name=cliente-service
quarkus.http.port=8080

# Base de datos H2 en memoria con datos ficticios (import.sql).
# Esta estrategia es SOLO para la vitrina. Produccion debe usar migraciones
# controladas (Flyway/Liquibase) y una base administrada.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:bancox;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# Cabeceras defensivas para todas las respuestas HTTP de la vitrina.
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Referrer-Policy".value=no-referrer
quarkus.http.header."Cross-Origin-Resource-Policy".value=same-site
quarkus.http.header."Cache-Control".value=no-store
quarkus.http.header."Permissions-Policy".value=camera=(), microphone=(), geolocation=()
